<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Neo — Swipe to trade</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #070b16;
    --glow:      #14103a;
    --card:      #0e1524;
    --panel:     #131c30;
    --border:    rgba(132,162,214,0.14);
    --text-hi:   #e9effb;
    --text-mid:  #8a97ad;
    --text-lo:   #5c6883;
    --neo-1:     #7b6bff;
    --neo-2:     #c264ff;
    --long:      #37d6a0;
    --short:     #ff5c7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: radial-gradient(130% 80% at 50% -10%, var(--glow) 0%, transparent 55%), var(--bg);
    color: var(--text-hi);
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    overflow: hidden;
  }
  .app { width: 100%; max-width: 440px; height: 100dvh; display: flex; flex-direction: column; padding: 14px 18px 20px; }

  /* header */
  header { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand img { height: 26px; width: auto; }
  .neo-badge {
    font-family: 'Newsreader', serif; font-size: 20px; font-weight: 500; letter-spacing: .5px;
    background: linear-gradient(100deg, var(--neo-1), var(--neo-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    padding-left: 10px; border-left: 1px solid var(--border);
  }
  .size-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 6px 6px 12px; font-size: 12px; color: var(--text-mid);
  }
  .size-chip b { color: var(--text-hi); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .size-chip button {
    width: 22px; height: 22px; border-radius: 50%; border: none; cursor: pointer;
    background: rgba(255,255,255,0.06); color: var(--text-hi); font-size: 14px; line-height: 1;
    display: grid; place-items: center;
  }
  .size-chip button:hover { background: rgba(255,255,255,0.12); }

  .hint { text-align: center; color: var(--text-lo); font-size: 12px; margin: 14px 0 4px; }
  .hint b.l { color: var(--short); } .hint b.r { color: var(--long); }

  /* deck */
  .deck { position: relative; flex: 1; margin-top: 8px; min-height: 380px; }

  .tcard {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, var(--card), #0b1120);
    border: 1px solid var(--border); border-radius: 22px;
    padding: 20px; display: flex; flex-direction: column;
    box-shadow: 0 24px 60px -34px rgba(0,0,0,0.9);
    will-change: transform; touch-action: none; user-select: none;
    transform-origin: 50% 130%;
  }
  .tcard.gone { transition: transform .45s cubic-bezier(.2,.7,.3,1), opacity .45s; }

  /* stamps */
  .stamp {
    position: absolute; top: 26px; font-weight: 800; font-size: 26px; letter-spacing: 2px;
    padding: 6px 14px; border-radius: 10px; border: 3px solid; opacity: 0; pointer-events: none;
    text-transform: uppercase;
  }
  .stamp.exec { right: 22px; color: var(--long); border-color: var(--long); transform: rotate(14deg); }
  .stamp.pass { left: 22px; color: var(--short); border-color: var(--short); transform: rotate(-14deg); }

  .row1 { display: flex; align-items: center; justify-content: space-between; }
  .pair { font-size: 24px; font-weight: 700; letter-spacing: -.3px; }
  .pair .quote { color: var(--text-lo); font-weight: 500; }
  .side {
    font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 5px 11px; border-radius: 8px;
  }
  .side.long  { color: var(--long);  background: color-mix(in srgb, var(--long) 14%, transparent);  border: 1px solid color-mix(in srgb, var(--long) 34%, transparent); }
  .side.short { color: var(--short); background: color-mix(in srgb, var(--short) 14%, transparent); border: 1px solid color-mix(in srgb, var(--short) 34%, transparent); }

  .sub { margin-top: 4px; color: var(--text-mid); font-size: 13px; display: flex; gap: 8px; align-items: center; }
  .lev { font-family: 'JetBrains Mono', monospace; color: var(--neo-2); font-weight: 600; }

  .spark { margin: 14px 0 4px; height: 74px; }
  .spark svg { width: 100%; height: 100%; overflow: visible; }

  /* confidence */
  .conf { margin-top: 6px; }
  .conf .lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-mid); margin-bottom: 6px; }
  .conf .lbl b { color: var(--text-hi); font-family: 'JetBrains Mono', monospace; }
  .conf .bar { height: 7px; border-radius: 999px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .conf .fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--neo-1), var(--neo-2)); }

  .levels { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 16px; }
  .lvl { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; }
  .lvl span { font-size: 10.5px; letter-spacing: .6px; color: var(--text-lo); text-transform: uppercase; }
  .lvl b { display: block; margin-top: 3px; font-family: 'JetBrains Mono', monospace; font-size: 14px; }
  .lvl.tp b { color: var(--long); } .lvl.sl b { color: var(--short); }

  .why { margin-top: 16px; font-size: 13px; line-height: 1.5; color: var(--text-mid); }
  .why b { color: var(--text-hi); font-weight: 600; }

  .empty {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 10px; color: var(--text-mid);
  }
  .empty.show { display: flex; }
  .empty .ico { width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--neo-2); display: grid; place-items: center; color: var(--neo-2); }
  .empty h3 { font-family: 'Newsreader', serif; font-weight: 500; color: var(--text-hi); font-size: 20px; }
  .empty button { margin-top: 8px; background: none; border: 1px solid var(--border); color: var(--text-hi); padding: 9px 16px; border-radius: 999px; cursor: pointer; font: inherit; font-size: 13px; }

  /* actions */
  .actions { display: flex; align-items: center; justify-content: center; gap: 22px; margin-top: 18px; }
  .act {
    border: none; cursor: pointer; border-radius: 50%; display: grid; place-items: center;
    transition: transform .14s ease, box-shadow .2s ease; background: var(--panel);
  }
  .act:active { transform: scale(.9); }
  .act.pass  { width: 58px; height: 58px; color: var(--short); border: 1.5px solid color-mix(in srgb, var(--short) 40%, transparent); }
  .act.exec  { width: 68px; height: 68px; color: #fff; background: linear-gradient(135deg, var(--long), #17a978); box-shadow: 0 12px 28px -12px var(--long); }
  .act.info  { width: 50px; height: 50px; color: var(--neo-2); border: 1.5px solid color-mix(in srgb, var(--neo-2) 40%, transparent); }
  .act svg { width: 44%; height: 44%; }
  .act:disabled { opacity: .35; pointer-events: none; }

  /* toast */
  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translate(-50%, 20px);
    background: #0f1830; border: 1px solid var(--border); border-radius: 14px;
    padding: 13px 16px; display: flex; align-items: center; gap: 12px; min-width: 260px; max-width: 92vw;
    opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; z-index: 50;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,.8);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  .toast .tico { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; flex-shrink: 0; }
  .toast.ok .tico  { background: color-mix(in srgb, var(--long) 18%, transparent);  color: var(--long); }
  .toast.err .tico { background: color-mix(in srgb, var(--short) 18%, transparent); color: var(--short); }
  .toast .ttxt { font-size: 13px; line-height: 1.35; }
  .toast .ttxt small { display: block; color: var(--text-mid); font-size: 11.5px; margin-top: 1px; }
  .toast .undo { margin-left: auto; background: none; border: none; color: var(--neo-2); font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .tcard.gone { transition: none; } }
</style>
</head>

<script>
/* ============================================================
   NEO — swipe-to-trade
   ============================================================ */

// --- 1. TRADE IDEAS -----------------------------------------
// Replace this static array with a fetch from your signals API, e.g.:
//   const ideas = await fetch('/api/neo/ideas').then(r => r.json());
// Each idea is one of Mariah's live setups.
const SAMPLE_IDEAS = [
  { id:'sig_1', pair:'BTC/USDT', side:'long',  entry:64180, tp:66750, sl:62900, lev:5,  conf:0.82,
    why:'Funding flipped negative while whale wallets accumulated 1,240 BTC in 4h. Reactor Core sees a squeeze setup.' },
  { id:'sig_2', pair:'ETH/USDT', side:'short', entry:3120,  tp:2980,  sl:3195,  lev:3,  conf:0.71,
    why:'Bearish divergence on 4h RSI plus rising exchange inflows. Sentiment agents turned net-negative overnight.' },
  { id:'sig_3', pair:'SOL/USDT', side:'long',  entry:148.2, tp:161.0, sl:141.5, lev:4,  conf:0.77,
    why:'On-chain activity spiking, DEX volume up 38%. Momentum + on-chain agents aligned bullish.' },
  { id:'sig_4', pair:'BNB/USDT', side:'long',  entry:592.0, tp:618.0, sl:578.0, lev:2,  conf:0.64,
    why:'Consolidation breakout forming above range high; low leverage given softer confidence.' },
  { id:'sig_5', pair:'XRP/USDT', side:'short', entry:0.612, tp:0.578, sl:0.631, lev:3,  conf:0.69,
    why:'Rejected at descending trendline for the 3rd time; funding overheated on the long side.' },
];
let ideas = SAMPLE_IDEAS.map(o => ({ ...o }));

// --- 2. EXECUTION HOOK --------------------------------------
// This is where a real trade fires. It POSTs the idea + size to YOUR backend,
// which holds the OKX keys and places the order (market entry + OCO TP/SL),
// exactly like Mariah's fusion route. Never call OKX directly from the browser.
// Reads your app's JWT. Adjust to however your Next.js app stores the session.
function authToken() {
  try { return localStorage.getItem('mx1_token') || ''; } catch (_) { return ''; }
}
function genIdem() {
  try { return crypto.randomUUID(); }
  catch (_) { return 'idem-' + Date.now() + '-' + Math.random().toString(16).slice(2); }
}

async function executeTrade(idea, sizeUsd) {
  const payload = {
    signalId: idea.id,
    pair:     idea.pair,
    side:     idea.side,      // 'long' | 'short'
    entry:    idea.entry,
    takeProfit: idea.tp,
    stopLoss:   idea.sl,
    leverage:   idea.lev,
    sizeUsd:    sizeUsd,
    source:   'neo-swipe',
  };
  const res = await fetch('/api/neo/execute', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + authToken(),
      'Idempotency-Key': idea._idem,   // one order per swipe; blocks double-fires
    },
    credentials: 'include',
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    let detail = 'HTTP ' + res.status;
    try { detail = (await res.json()).detail || detail; } catch (_) {}
    throw new Error(detail);
  }
  return res.json(); // { orderId, status, mode }
}

// Pull live setups from the backend; fall back to samples if unavailable.
async function fetchIdeas() {
  try {
    const res = await fetch('/api/neo/ideas', {
      headers: { 'Authorization': 'Bearer ' + authToken() },
      credentials: 'include',
    });
    if (!res.ok) throw 0;
    const live = await res.json();
    if (Array.isArray(live) && live.length) ideas = live;
  } catch (_) {
    if (!ideas.length) ideas = SAMPLE_IDEAS.map(o => ({ ...o }));  // preview mode
  }
  ideas.forEach(i => { if (!i._idem) i._idem = genIdem(); });
  render();
}

// --- 3. STATE + DOM -----------------------------------------
const deck   = document.getElementById('deck');
const empty  = document.getElementById('empty');
const sizeEl = document.getElementById('size');
let sizeUsd  = 50;
const SIZES  = [10, 25, 50, 100, 250, 500, 1000];
let sizeIdx  = 2;
let cards    = [];          // DOM card stack (top = last)
let busy     = false;

function money(n){ return n >= 1 ? '$' + n.toLocaleString(undefined,{maximumFractionDigits:2}) : '$' + n; }

function sparkline(idea){
  // random-walk path tinted by direction; purely decorative preview
  const up = idea.side === 'long';
  const n = 40, w = 300, h = 74;
  let y = h*0.5, pts = [];
  const drift = up ? -0.9 : 0.9;
  for (let i=0;i<n;i++){ y += (Math.random()-0.5)*10 + drift; y = Math.max(8, Math.min(h-8, y)); pts.push([i/(n-1)*w, y]); }
  const d = pts.map((p,i)=> (i?'L':'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const col = up ? 'var(--long)' : 'var(--short)';
  const id = 'g'+idea.id;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity="0.28"/><stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${d} L ${w} ${h} L 0 ${h} Z" fill="url(#${id})"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>
  </svg>`;
}

function buildCard(idea){
  const el = document.createElement('div');
  el.className = 'tcard';
  const [base, quote] = idea.pair.split('/');
  el.innerHTML = `
    <div class="stamp exec">Execute</div>
    <div class="stamp pass">Pass</div>
    <div class="row1">
      <div class="pair">${base}<span class="quote">/${quote}</span></div>
      <div class="side ${idea.side}">${idea.side.toUpperCase()}</div>
    </div>
    <div class="sub">Entry ${money(idea.entry)} · <span class="lev">${idea.lev}× leverage</span></div>
    <div class="spark">${sparkline(idea)}</div>
    <div class="conf">
      <div class="lbl">Mariah confidence <b>${Math.round(idea.conf*100)}%</b></div>
      <div class="bar"><div class="fill" style="width:${Math.round(idea.conf*100)}%"></div></div>
    </div>
    <div class="levels">
      <div class="lvl"><span>Entry</span><b>${money(idea.entry)}</b></div>
      <div class="lvl tp"><span>Take profit</span><b>${money(idea.tp)}</b></div>
      <div class="lvl sl"><span>Stop loss</span><b>${money(idea.sl)}</b></div>
    </div>
    <div class="why"><b>Why:</b> ${idea.why}</div>
  `;
  el._idea = idea;
  attachDrag(el);
  return el;
}

function render(){
  cards.forEach(c=>c.remove());
  cards = [];
  const view = ideas.slice(0, 3).reverse(); // render up to 3, top last
  view.forEach((idea, i)=>{
    const el = buildCard(idea);
    const depth = view.length - 1 - i;       // 0 = top
    el.style.transform = `translateY(${depth*10}px) scale(${1 - depth*0.04})`;
    el.style.zIndex = 10 + i;
    el.style.opacity = depth > 1 ? 0 : 1;
    deck.appendChild(el);
    cards.push(el);
  });
  empty.classList.toggle('show', ideas.length === 0);
  const none = ideas.length === 0;
  document.getElementById('btn-pass').disabled = none;
  document.getElementById('btn-exec').disabled = none;
  document.getElementById('btn-info').disabled = none;
}

function topCard(){ return cards[cards.length-1]; }

// --- 4. DRAG PHYSICS ----------------------------------------
function attachDrag(el){
  let startX=0, startY=0, dx=0, dy=0, dragging=false;
  const exec = el.querySelector('.stamp.exec');
  const pass = el.querySelector('.stamp.pass');

  const down = e=>{
    if (el !== topCard() || busy) return;
    dragging = true; startX = e.clientX; startY = e.clientY;
    el.style.transition = 'none';
    el.setPointerCapture(e.pointerId);
  };
  const move = e=>{
    if (!dragging) return;
    dx = e.clientX - startX; dy = e.clientY - startY;
    const rot = dx / 18;
    el.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
    const t = Math.min(Math.abs(dx)/110, 1);
    exec.style.opacity = dx > 0 ? t : 0;
    pass.style.opacity = dx < 0 ? t : 0;
  };
  const up = e=>{
    if (!dragging) return;
    dragging = false;
    const threshold = 110;
    if (dx > threshold)      fling('right');
    else if (dx < -threshold) fling('left');
    else {
      el.style.transition = 'transform .3s cubic-bezier(.2,.7,.3,1)';
      el.style.transform = '';
      exec.style.opacity = pass.style.opacity = 0;
    }
  };
  el.addEventListener('pointerdown', down);
  el.addEventListener('pointermove', move);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
}

function fling(dir){
  const el = topCard();
  if (!el || busy) return;
  busy = true;
  const idea = el._idea;
  const off = dir === 'right' ? window.innerWidth : -window.innerWidth;
  const rot = dir === 'right' ? 22 : -22;
  el.classList.add('gone');
  el.style.transform = `translate(${off}px, -40px) rotate(${rot}deg)`;
  el.style.opacity = 0;

  setTimeout(()=>{
    ideas = ideas.filter(x => x.id !== idea.id);
    render();
    busy = false;
    if (dir === 'right') onExecute(idea);
    else showToast('err', 'Passed', idea.pair + ' skipped', null);
  }, 300);
}

// --- 5. EXECUTE + TOAST -------------------------------------
async function onExecute(idea){
  showToast('ok', 'Executing ' + idea.side.toUpperCase() + ' ' + idea.pair,
            money(sizeUsd) + ' · ' + idea.lev + '× · placing order…', null);
  try {
    const result = await executeTrade(idea, sizeUsd);
    showToast('ok', 'Order placed · ' + idea.pair,
              'Entry ' + money(idea.entry) + ' · TP ' + money(idea.tp) + ' · SL ' + money(idea.sl), null);
  } catch (err) {
    // In this preview there's no backend, so the fetch will fail — that's expected.
    showToast('err', 'Could not place order', String(err.message || err) + ' — connect /api/neo/execute', null);
  }
}

let toastTimer;
function showToast(kind, title, sub, undoFn){
  const t = document.getElementById('toast');
  const ico = document.getElementById('toast-ico');
  const txt = document.getElementById('toast-txt');
  const undo = document.getElementById('toast-undo');
  t.className = 'toast show ' + kind;
  ico.innerHTML = kind === 'ok'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
  txt.innerHTML = title + '<small>' + sub + '</small>';
  undo.hidden = !undoFn;
  undo.onclick = undoFn || null;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 3200);
}

// --- 6. BUTTONS + KEYS + SIZE -------------------------------
document.getElementById('btn-pass').onclick = ()=> fling('left');
document.getElementById('btn-exec').onclick = ()=> fling('right');
document.getElementById('btn-info').onclick = ()=>{
  const el = topCard(); if (!el) return;
  showToast('ok', el._idea.pair + ' details', el._idea.why, null);
};
document.getElementById('reload').onclick = ()=> fetchIdeas();

window.addEventListener('keydown', e=>{
  if (e.key === 'ArrowRight') fling('right');
  if (e.key === 'ArrowLeft')  fling('left');
});

function updateSize(){ sizeUsd = SIZES[sizeIdx]; sizeEl.textContent = money(sizeUsd); }
document.getElementById('size-up').onclick = ()=>{ sizeIdx = Math.min(SIZES.length-1, sizeIdx+1); updateSize(); };
document.getElementById('size-dn').onclick = ()=>{ sizeIdx = Math.max(0, sizeIdx-1); updateSize(); };

// --- init ---
updateSize();
fetchIdeas();
</script>
</body>
